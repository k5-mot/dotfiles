### Shell {{{
## tmux起動時のシェルをzshにする
set-option -g default-shell "/bin/zsh"
## tmuxを256色表示できるようにする
set -g default-terminal "screen-256color"
set -g terminal-overrides 'xterm:colors=256'
## 全てのベルを無視
set-option -g bell-action none
## ESCキーの遅延を解消
set -s escape-time 0
## ウィンドウのインデックスを1から始める
set -g base-index 1
## ペインのインデックスを1から始める
setw -g pane-base-index 1
## アクティブなペインのみ白っぽく変更（真っ黒は232）
#set -g window-style 'bg=colour239'
#set -g window-active-style 'bg=colour234'
### }}}

### Keybind {{{
## prefixキーをC-qに変更
set -g prefix C-q
## C-bのキーバインドを解除
unbind-key C-b
bind-key C-q send-prefix
## vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
## vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
## | でペインを縦分割する
bind | split-window -h
## - でペインを縦分割する
bind - split-window -v
# コピーモードを設定する
# コピーモードでvimキーバインドを使う
setw -g mode-keys vi
# 'v' で選択を始める
bind -T copy-mode-vi v send -X begin-selection
# 'V' で行選択
bind -T copy-mode-vi V send -X select-line
# 'C-v' で矩形選択
bind -T copy-mode-vi C-v send -X rectangle-toggle
# 'y' でヤンク
bind -T copy-mode-vi y send -X copy-selection
# 'Y' で行ヤンク
bind -T copy-mode-vi Y send -X copy-line
# 'C-p'でペースト
bind-key C-p paste-buffer
#bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "win32yank.exe -i"
#unbind -T copy-mode-vi Enter
#bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "win32yank.exe -i"
#bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "win32yank.exe -i"
#unbind-key -T prefix v
#bind-key v run "win32yank.exe -o | tmux load-buffer - && tmux paste-buffer"
### }}}

### Mouse {{{
# マウス操作を有効にする
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
#bind -n WheelDownPane select-pane -t= ; send-keys -M
### }}}

### Font {{{
SEPARATOR_LEFT="\ue0b0"
SEPARATOR_RIGHT="\ue0b2"
SUBSEPARATOR_LEFT="\ue0b1"
SUBSEPARATOR_RIGHT="\ue0b3"
### }}}

### Plugin {{{
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
#set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'
#set -g @plugin 'fcambus/ansiweather'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com/user/plugin'
# set -g @plugin 'git@bitbucket.com/user/plugin'
### }}}

### Statusline {{{
# ステータスバーをトップに配置する
#set-option -g status-position top
set-option -g status-position bottom
# status line を更新する間隔を 1 秒にする
set-option -g status-interval 1
# window-status を中央揃えで配置する
set-option -g status-justify "centre"
# status line の文字色を指定する。
#set-option -g status-fg "colour253"
set-option -g status-fg "colour245"
# status line の背景色を指定する。
#set-option -g status-bg "colour237"
set-option -g status-bg "colour236"
# status-left の最大の長さを指定する。
set-option -g status-left-length 120
# status-right の最大の長さを指定する。
set-option -g status-right-length 120
# status-left のフォーマットを指定する。
#set -g status-left "#[fg=colour22,bg=colour148,bold] #(whoami)@#h #[fg=colour148,bg=colour240]${SEPARATOR_LEFT}#[fg=colour231,bg=colour240,bold] #{pane_current_path} #[fg=colour240,bg=colour236]${SEPARATOR_LEFT}#[default]Battery: #{battery_icon} #{battery_percentage} #{battery_remain} Online: #{online_status} CPU: #{cpu_icon} #{cpu_percentage}"
set -g status-left "#[fg=colour22,bg=colour148,bold] #(whoami)@#h #[fg=colour148,bg=colour240]${SEPARATOR_LEFT}#[fg=colour231,bg=colour240,bold] #{pane_current_path} #[fg=colour240]#(tmux-git '#{pane_current_path}')#[default]"
# status-right のフォーマットを指定する。
set -g status-right "#[default]${SUBSEPARATOR_RIGHT}#[fg=colour247,bg=colour236] [S] #S #[fg=colour240,bg=colour236]${SEPARATOR_RIGHT}#[fg=colour250,bg=colour240] [W] #W(#I) #[fg=colour252,bg=colour240]${SEPARATOR_RIGHT}#[fg=colour241,bg=colour252] [P] #P #[default]"
## window-status のフォーマットを指定する。
set-window-option -g window-status-format "#[fg=colour240,bg=colour235] #I: #W #[default]"
# カレントウィンドウの window-status のフォーマットを指定する
set-window-option -g window-status-current-format "#[fg=colour117,bg=colour24,bold] #I: #W #[default]"
### }}}

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOME/.tmux/plugins/tpm/tpm'
