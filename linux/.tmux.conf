set -g status-left "#{pane_current_path}"
set -g window-status-format "#{pane_current_path}"


# status line を更新する間隔を 1 秒にする
set-option -g status-interval 1

# window-status を中央揃えで配置する
set-option -g status-justify "centre"

# status line の背景色を指定する。
set-option -g status-bg "colour238"

# status line の文字色を指定する。
set-option -g status-fg "colour255"

# status-left の最大の長さを指定する。
set-option -g status-left-length 90

# status-left のフォーマットを指定する。
#set-option -g status-left "#[fg=colour255,bg=colour241]Session: #S #[default] #{pane_current_path} #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD)"
#set-option -g status-left "#[fg=colour255,bg=colour241]#S/#W/#P #[default] #{pane_current_path} #(tmux-pane-border '#{pane_current_path}')"
#set-option -g status-left "#[fg=colour255,bg=colour241]#S/#W/#P #[default]"
set-option -g status-left "#[fg=colour255,bg=colour241]#(whoami) #h #(tmux-pane-border '#{pane_current_path}')#[fg=colour255,bg=colour241]#{pane_current_path} "

# status-right の最大の長さを指定する。
set-option -g status-right-length 100

#'separator': { 'left': "\ue0b0 ", 'right': " \ue0b2" },
# status-right のフォーマットを指定する。
#set-option -g status-right "#[fg=colour255,bg=colour241] #h | LA: #(cut -d' ' -f-3 /proc/loadavg) | %m/%d %H:%M:%S#[default]"
#set-option -g status-right "#(tmux-pane-border '#{pane_current_path}')#[fg=colour255,bg=colour241]#{pane_current_path} | #h"
set-option -g status-right "#[fg=colour255,bg=colour241]#S/#W/#P #[default]"

# window-status のフォーマットを指定する。
set-window-option -g window-status-format " #I: #W "

# カレントウィンドウの window-status のフォーマットを指定する
set-window-option -g window-status-current-format "#[fg=colour255,bg=colour27,bold] #I: #W #[default]"
