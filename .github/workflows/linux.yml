name: linux

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  ubuntu-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        script: ["./bin/install_anyenv1.sh"]

    steps:
      - uses: actions/checkout@v2
      - name: Show GitHub Workspace
        run: echo $GITHUB_WORKSPACE
      - name: Change shell from bash to zsh.
        run: |
          sudo apt install zsh -y
          sudo chsh -s $(which zsh)
          exec $SHELL -l
        #- name: Update packages via apt
        #  run: |
        #    cd $GITHUB_WORKSPACE/bin
        #    ./update_apt.sh
        #      - name: Install packages via apt
        #        run: |
        #          cd $GITHUB_WORKSPACE/bin
        #          sudo bash install_apt_package.sh
      - name: Install configurations
        run: make install
      - name: Install anyenv(pyenv, rbenv, nodenv, plenv)
        run: |
          cd $GITHUB_WORKSPACE/bin/anyenv
          ./anyenv1.sh
          exec $SHELL -l
          ./anyenv2.sh
      - name: Install rust & cargo packages.
        run: |
          cd $GITHUB_WORKSPACE/bin/rust
          ./install.sh
          exec $SHELL -l
          ./cargo.sh
          ./alacritty.sh
      - name: Install porg & porg packages.
        run: |
          cd $GITHUB_WORKSPACE/bin/porg
          ./porg.sh
          ./git.sh
          ./xsel.sh
          ./libevent.sh
          ./ncurses.sh
          ./tmux.sh
          ./vim.sh
          ./neovim.sh



