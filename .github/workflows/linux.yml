name: linux

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  ubuntu-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        script: ["./bin/install_anyenv1.sh"]

    steps:
      - uses: actions/checkout@v2
      - name: Show GitHub Workspace
        run: echo $GITHUB_WORKSPACE
      - name: Install packages via apt
        run: |
          cd $GITHUB_WORKSPACE/bin
          sudo bash install_apt_package.sh
      - name: Install configurations
        run: make install
      - name: Install packages via apt
        working-directory: ${GITHUB_WORKSPACE}/bin
        run: sudo bash ./install_apt_packages.sh
      - name: Install anyenv
        run: ${{matrix.script}}


