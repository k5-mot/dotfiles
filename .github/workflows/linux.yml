name: linux

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  ubuntu-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Show GitHub Workspace
        run: echo $GITHUB_WORKSPACE
      - name: Install zsh.
        run: |
          sudo apt install zsh -y
          exec $SHELL -l
      - name: Check $PATH.
        shell: zsh {0}
        run: |
          export PATH=$HOME/.local/usr/bin:$PATH
          echo "SHELL: "
          echo $SHELL
          echo ""
          echo "PATH : "
          echo $PATH | sed -e "s/:/\n/g"
          echo ""
      - name: Install Linuxbrew.
        shell: zsh {0}
        run: |
          cd $GITHUB_WORKSPACE/conf/.config/scripts/brew
          ./install.sh
      - name: Update & Install packages via apt
        shell: zsh {0}
        run: |
          cd $GITHUB_WORKSPACE/conf/.config/scripts/apt
          ./update.sh
          ./install.sh
      - name: Install configurations
        run: make install
      - name: Install anyenv(pyenv, rbenv, nodenv, plenv)
        run: |
          cd $GITHUB_WORKSPACE/bin/anyenv
          ./anyenv1.sh
          exec $SHELL -l
          ./anyenv2.sh
