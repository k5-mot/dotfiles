name: linux

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  ubuntu-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        script: ["./bin/install_anyenv1.sh"]

    steps:
      - uses: actions/checkout@v2
      - name: Show GitHub Workspace
        run: echo $GITHUB_WORKSPACE
      - name: Install zsh.
        run: |
          sudo apt install zsh -y
          exec $SHELL -l
      - name: Check $SHELL.
        shell: zsh {0}
        run: echo $SHELL
      - name: Check $PATH.
        shell: zsh {0}
        run: |
          export PATH=$HOME/.local/usr/bin:$PATH
          echo PATH
          echo $PATH | sed -e "s/:/\n/g"
          echo ""
          echo LD_LIBRARY_PATH
          echo $LD_LIBRARY_PATH | sed -e "s/:/\n/g"
          echo ""
